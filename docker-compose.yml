services:
  postgres:
    image: postgres:16-alpine
    container_name: madem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: madem
      POSTGRES_PASSWORD: madem
      POSTGRES_DB: madem_crm
    ports:
      - '5432:5432'
    volumes:
      - madem_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U madem -d madem_crm']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: madem_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - madem_minio:/data

volumes:
  madem_pgdata:
  madem_minio:
